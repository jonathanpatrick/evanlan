# Rename to your app slug on first deploy, then:
#   fly volumes create league_data --size 1 --region <region>
#   fly secrets set INGEST_TOKEN=$(openssl rand -hex 32)
#   fly deploy
app = "evanlan"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  DATABASE_PATH = "/data/league.db"
  WEB_DIST = "/app/dist/web"

[[mounts]]
  source = "league_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
